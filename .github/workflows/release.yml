name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Build for simulator (unsigned)
        run: |
          xcodebuild \
            -workspace ios/testapp.xcworkspace \
            -scheme testapp \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: testapp-ios-simulator-${{ github.ref_name }}
          path: build/Build/Products/Release-iphonesimulator/testapp.app
